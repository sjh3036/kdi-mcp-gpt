services:
  - type: web
    name: kdi-mcp-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: KDI_API_KEY
        sync: false
      - key: KDI_CATEGORY_CODES
        value: A,B,C,D,E,F
  - type: web
    name: estimate-advisor-mcp-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python estimate_advisor_server.py
    envVars:
      - key: LAW_OC
        sync: false
